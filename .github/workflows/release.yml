name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.1)"
        required: true

permissions:
  contents: write

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - run: npm test

  publish-npm:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-jsr:
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
      - run: npx jsr publish
        continue-on-error: true

  binaries:
    needs: build-test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: slay-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: slay-linux-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: slay-darwin-x64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: slay-darwin-arm64
          - os: windows-latest
            target: bun-windows-x64
            artifact: slay-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Compile binary
        run: bun build ./src/index.ts --compile --target=${{ matrix.target }} --outfile ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: [publish-npm, publish-jsr, binaries]
    if: always() && needs.binaries.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: artifacts/*

  update-homebrew:
    needs: release
    if: always() && needs.release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: hammadxcm/homebrew-slay
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      - name: Update formula
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          BASE_URL="https://github.com/hammadxcm/slay/releases/download/${TAG}"

          SHA_DARWIN_ARM64=$(curl -sL "${BASE_URL}/slay-darwin-arm64" | shasum -a 256 | cut -d' ' -f1)
          SHA_DARWIN_X64=$(curl -sL "${BASE_URL}/slay-darwin-x64" | shasum -a 256 | cut -d' ' -f1)
          SHA_LINUX_ARM64=$(curl -sL "${BASE_URL}/slay-linux-arm64" | shasum -a 256 | cut -d' ' -f1)
          SHA_LINUX_X64=$(curl -sL "${BASE_URL}/slay-linux-x64" | shasum -a 256 | cut -d' ' -f1)

          cat > Formula/slay-port.rb << RUBY
          class SlayPort < Formula
            desc "kill processes by port. Beautifully."
            homepage "https://slay.fyniti.co.uk"
            license "MIT"
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/slay-darwin-arm64"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "${BASE_URL}/slay-darwin-x64"
                sha256 "${SHA_DARWIN_X64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${BASE_URL}/slay-linux-arm64"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "${BASE_URL}/slay-linux-x64"
                sha256 "${SHA_LINUX_X64}"
              end
            end

            def install
              binary = Dir.glob("slay-*").first
              mv binary, "slay"
              bin.install "slay"
            end

            test do
              assert_match "slay", shell_output("#{bin}/slay --help")
            end
          end
          RUBY

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/slay-port.rb
          git commit -m "Update slay-port to ${VERSION}"
          git push
