name: Version Bump

on:
  workflow_dispatch:
    inputs:
      type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npx tsc --noEmit

      - run: npm run build

      - run: npm test

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: npm version ${{ inputs.type }}

      - name: Sync jsr.json version
        run: |
          VERSION=$(node -p 'require("./package.json").version')
          node -e "
            const fs = require('fs');
            const jsr = JSON.parse(fs.readFileSync('jsr.json', 'utf8'));
            jsr.version = '$VERSION';
            fs.writeFileSync('jsr.json', JSON.stringify(jsr, null, 2) + '\n');
          "
          git add jsr.json
          git commit --amend --no-edit

      - name: Push commit and tag
        run: git push --follow-tags

      - name: Get new version tag
        id: tag
        run: echo "version=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_OUTPUT"

      - name: Trigger release workflow
        run: gh workflow run Release -f tag="v${{ steps.tag.outputs.version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
